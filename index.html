<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        /* Banner Naranja Superior */
        .banner {
            background-color: #ff6b00;
            color: white;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Barra de Navegación con divisiones grises */
        .nav-bar {
            display: flex;
            background-color: #333; /* El fondo oscuro de la captura */
            text-align: center;
        }

        .nav-item {
            flex: 1;
            padding: 12px 0;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-right: 1px solid #555; /* División del rectángulo */
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item.active {
            background-color: #b0b0b0; /* El gris claro para la pestaña activa */
            color: #333;
        }

        /* Contenedor de contenido */
        .content {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-top: 20px;
        }

        /* Avatar Circular */
        .avatar {
            width: 80px;
            height: 80px;
            background-color: #fce4d6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
        }

        .user-info h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .status {
            color: #444;
            font-size: 0.95rem;
            margin: 5px 0;
        }

        /* Botón Naranja Redondo */
        .btn-share {
            display: block;
            background-color: #ff6b00;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin: 25px 0;
        }

        /* Lista de opciones */
        .options-list {
            border-top: 1px solid #ccc;
        }

        .option-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            color: #ff6b00; /* Texto naranja como en la foto */
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="banner">
        PLUGGER
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item">INICIO</a>
        <a href="#" class="nav-item active">PERFIL (9+)</a>
        <a href="#" class="nav-item">AMIGOS</a>
    </div>

    <div class="content">
        <div class="profile-header">
            <div class="avatar">
                <span style="font-size: 40px; opacity: 0.2;">👤</span>
            </div>
            <div class="user-info">
                <h2>Usuario Plugger</h2>
                <p class="status">La más grande mentira es finjir en mi cara que soy feliz..</p>
                <a href="#" style="color: #ff6b00; text-decoration: none; font-size: 0.8rem;">Actualiza tu estado</a>
            </div>
        </div>

        <a href="#" class="btn-share">+ COMPARTE TUS FOTOS</a>

        <div class="options-list">
            <div class="option-item">ACTIVIDADES</div>
            <div class="option-item">CONVERSACIONES (9+)</div>
            <div class="option-item">FOTOS Y VIDEOS</div>
            <div class="option-item">INFORMACIÓN DE PERFIL</div>
        </div>
    </div>

</body>
</html>
