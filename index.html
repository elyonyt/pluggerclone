<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugger | Mi Perfil</title>
    <style>
        /* Estilo Minimalista y Redondeado */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: #ffffff; /* Fondo blanco puro para limpieza */
            color: #1a1a1a;
        }

        header {
            background-color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #ff6b00;
            letter-spacing: -1px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 25px;
        }

        /* Perfil Circular */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            background-color: #f2f2f2;
            border-radius: 50%; /* Círculo perfecto */
            margin-bottom: 15px;
            border: 3px solid #ff6b00; /* Aro naranja sutil */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .username {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
        }

        .status-text {
            color: #666;
            font-size: 0.95rem;
            margin: 8px 0;
            font-style: italic;
            line-height: 1.4;
        }

        /* Botón muy redondeado */
        .btn-action {
            display: block;
            background-color: #ff6b00;
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 50px; /* Bordes tipo pastilla */
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.2);
        }

        /* Lista de opciones con diseño redondo */
        .menu-list {
            list-style: none;
            padding: 0;
        }

        .menu-item {
            background: #f9f9f9;
            margin-bottom: 12px;
            padding: 18px 25px;
            border-radius: 40px; /* Redondeado en las puntas */
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: #ffffff;
            border: 1px solid #ff6b00;
            transform: scale(1.02);
        }

        .count {
            background-color: #ff6b00;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Plugger</div>
        <div style="cursor: pointer; font-size: 1.2rem;">⚙️</div>
    </header>

    <div class="container">
        <div class="profile-section">
            <div class="avatar">
                <span style="font-size: 40px; opacity: 0.3;">👤</span>
            </div>
            <h2 class="username">Usuario Plugger</h2>
            <p class="status-text">"La más grande mentira es finjir en mi cara que soy feliz.."</p>
        </div>

        <a href="#" class="btn-action">+ Comparte tus fotos</a>

        <div class="menu-list">
            <div class="menu-item">
                <span>Actividades</span>
                <span>➔</span>
            </div>
            <div class="menu-item">
                <span>Conversaciones</span>
                <span class="count">9+</span>
            </div>
            <div class="menu-item">
                <span>Fotos y Videos</span>
                <span>➔</span>
            </div>
            <div class="menu-item">
                <span>Información de perfil</span>
                <span>➔</span>
            </div>
        </div>
    </div>

</body>
</html>
